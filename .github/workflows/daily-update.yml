name: Daily update.json refresh

on:
  schedule:
    - cron: "10 12 * * *" # runs daily at 12:10 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build updates.json
        run: node scripts/build_updates.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json
          git diff --staged --quiet || (git commit -m "Daily refresh updates.json" && git push)
